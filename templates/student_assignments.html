<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Assignments | IntelliLMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

    body{
        font-family:'Poppins',sans-serif;
        background:#f8fafc;
        padding:40px;
    }

    .topbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:40px;
    }

    .title{
        font-size:36px;
        font-weight:700;
    }

    .back-btn{
        background:#4f46e5;
        color:white;
        padding:12px 22px;
        border-radius:12px;
        text-decoration:none;
        font-weight:500;
    }

    .assignment-card{
        background:white;
        border-radius:25px;
        padding:30px;
        box-shadow:0 10px 30px rgba(0,0,0,0.05);
        margin-bottom:25px;
    }

    .assignment-title{
        font-size:24px;
        font-weight:700;
        margin-bottom:10px;
    }

    .assignment-desc{
        color:#6b7280;
        line-height:1.8;
    }

    .assignment-meta{
        margin-top:20px;
        display:flex;
        gap:20px;
        flex-wrap:wrap;
    }

    .meta-box{
        background:#eef2ff;
        padding:12px 18px;
        border-radius:14px;
        font-size:14px;
        font-weight:500;
    }

    .upload-form{
        margin-top:25px;
    }

    .form-control{
        border-radius:12px;
        padding:12px;
    }

    .submit-btn{
        margin-top:15px;
        border:none;
        background:linear-gradient(to right,#4f46e5,#7c3aed);
        color:white;
        padding:14px 24px;
        border-radius:14px;
        font-weight:600;
    }

    </style>

</head>

<body>

<div class="topbar">

    <div class="title">

        Student Assignments 📚

    </div>

    <a href="/student"
       class="back-btn">

       ← Dashboard

    </a>

</div>

{% for assignment in assignments %}

<div class="assignment-card">

    <div class="assignment-title">

        {{ assignment['title'] }}

    </div>

    <div class="assignment-desc">

        {{ assignment['description'] }}

    </div>

    <div class="assignment-meta">

        <div class="meta-box">

            Due: {{ assignment['deadline'] }}

        </div>

        <div class="meta-box">

            Marks: {{ assignment['total_marks'] }}

        </div>

    </div>

    <!-- UPLOAD FORM -->

    <form action="/submit_assignment/{{ assignment['id'] }}"
          method="POST"
          enctype="multipart/form-data"
          class="upload-form">

        <input type="file"
               name="submission_file"
               class="form-control"
               required>

        <button type="submit"
                class="submit-btn">

            Upload Submission

        </button>

    </form>

</div>

{% endfor %}

</body>

</html>
