<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Quiz Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f8fafc;
}

/* SIDEBAR */

.sidebar{
    width:270px;
    height:100vh;
    position:fixed;
    top:0;
    left:0;
    background:#111827;
    padding:30px 20px;
}

.logo{
    font-size:30px;
    font-weight:800;
    color:#8b5cf6;
    margin-bottom:50px;
}

.menu a{
    display:block;
    color:#d1d5db;
    text-decoration:none;
    padding:14px 18px;
    border-radius:14px;
    margin-bottom:12px;
    transition:0.3s;
    font-weight:500;
}

.menu a:hover{
    background:#8b5cf6;
    color:white;
}

/* MAIN CONTENT */

.main-content{
    margin-left:270px;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

/* RESULT CARD */

.result-card{
    background:white;
    padding:60px;
    border-radius:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    text-align:center;
    max-width:700px;
    width:100%;
}

.result-title{
    font-size:42px;
    font-weight:700;
    margin-bottom:25px;
}

.result-text{
    font-size:26px;
    font-weight:600;
    margin-bottom:35px;
}

.back-btn{
    display:inline-block;
    padding:14px 28px;
    border-radius:16px;
    background:linear-gradient(to right,#4f46e5,#7c3aed);
    color:white;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

.back-btn:hover{
    transform:translateY(-3px);
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">

        IntelliLMS

    </div>

    <div class="menu">

        <a href="/student">
            Dashboard
        </a>

        <a href="/student/courses">
            My Courses
        </a>

        <a href="/student/assignments">
            Assignments
        </a>

        <a href="/student/attendance">
            Attendance
        </a>

        <a href="/student/quizzes">
            Quizzes
        </a>

        <a href="/analytics">
            Analytics
        </a>

        <a href="/ai_recommendations">
            AI Recommendations
        </a>

        <a href="/logout">
            Logout
        </a>

    </div>

</div>

<!-- MAIN CONTENT -->

<div class="main-content">

    <div class="result-card">

        <div class="result-title">

            Quiz Result 🧠

        </div>

        <div class="result-text">

            {{ result }}

        </div>

        <a href="/student/quizzes"
           class="back-btn">

            Back to Quizzes

        </a>

    </div>

</div>

</body>

</html>
