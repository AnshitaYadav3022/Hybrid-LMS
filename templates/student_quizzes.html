<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Quizzes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:#f8fafc;
    padding:40px;
}

.page-title{
    font-size:38px;
    font-weight:700;
    margin-bottom:40px;
}

.quiz-card{
    background:white;
    border-radius:25px;
    padding:30px;
    margin-bottom:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.quiz-title{
    font-size:24px;
    font-weight:700;
    margin-bottom:15px;
}

.quiz-subject{
    color:#6b7280;
    margin-bottom:20px;
}

.option{
    background:#eef2ff;
    padding:14px 18px;
    border-radius:14px;
    margin-bottom:12px;
}

.submit-btn{
    margin-top:20px;
    border:none;
    background:linear-gradient(to right,#4f46e5,#7c3aed);
    color:white;
    padding:14px 24px;
    border-radius:14px;
    font-weight:600;
}

</style>

</head>

<body>

<div class="page-title">

    Student Quizzes 🧠

</div>

{% for quiz in quizzes %}

<div class="quiz-card">

    <div class="quiz-title">

        {{ quiz['question'] }}

    </div>

    <div class="quiz-subject">

        Subject: {{ quiz['subject'] }}

    </div>

<form action="/submit_quiz/{{ quiz['id'] }}"
      method="POST">

    <div class="option">

        <input type="radio"
               name="answer"
               value="{{ quiz['option1'] }}"
               required>

        {{ quiz['option1'] }}

    </div>

    <div class="option">

        <input type="radio"
               name="answer"
               value="{{ quiz['option2'] }}">

        {{ quiz['option2'] }}

    </div>

    <div class="option">

        <input type="radio"
               name="answer"
               value="{{ quiz['option3'] }}">

        {{ quiz['option3'] }}

    </div>

    <div class="option">

        <input type="radio"
               name="answer"
               value="{{ quiz['option4'] }}">

        {{ quiz['option4'] }}

    </div>

    <button type="submit"
            class="submit-btn">

        Submit Answer

    </button>

</form>

</div>

{% endfor %}

</body>

</html>
