<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Quiz Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#f8fafc;
    font-family:Poppins,sans-serif;
    padding:40px;
}

.card{
    border:none;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

</style>

</head>

<body>

<h1 class="mb-4">

    Student Quiz Results 🧠

</h1>

<div class="card p-4">

<table class="table">

<tr>
    <th>Student</th>
    <th>Question</th>
    <th>Selected</th>
    <th>Correct</th>
    <th>Score</th>
</tr>

{% for result in results %}

<tr>

    <td>{{ result['student_name'] }}</td>

    <td>{{ result['question'] }}</td>

    <td>{{ result['selected_answer'] }}</td>

    <td>{{ result['correct_answer'] }}</td>

    <td>

        {% if result['score'] == 1 %}

            ✅ Correct

        {% else %}

            ❌ Wrong

        {% endif %}

    </td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
