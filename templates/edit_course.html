<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Course</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f8fafc;
}

/* SIDEBAR */

.sidebar{
    width:270px;
    height:100vh;
    position:fixed;
    background:#111827;
    padding:30px 20px;
    color:white;
}

.logo{
    font-size:30px;
    font-weight:800;
    color:#8b5cf6;
    margin-bottom:50px;
}

.menu a{
    display:block;
    color:#d1d5db;
    text-decoration:none;
    padding:14px 18px;
    border-radius:14px;
    margin-bottom:12px;
    transition:0.3s;
    font-weight:500;
}

.menu a:hover{
    background:#8b5cf6;
    color:white;
}

/* MAIN */

.main-content{
    margin-left:270px;
    padding:50px;
}

/* FORM CARD */

.form-card{
    background:white;
    border-radius:30px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    max-width:800px;
}

.page-title{
    font-size:40px;
    font-weight:700;
    margin-bottom:10px;
}

.subtitle{
    color:#6b7280;
    margin-bottom:35px;
}

.form-control{
    height:55px;
    border-radius:16px;
    border:none;
    background:#f1f5f9;
    margin-bottom:20px;
    padding-left:18px;
}

textarea.form-control{
    height:140px;
    padding-top:15px;
}

.form-control:focus{
    box-shadow:none;
    border:2px solid #8b5cf6;
    background:white;
}

.update-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:16px;
    background:linear-gradient(to right,#4f46e5,#7c3aed);
    color:white;
    font-size:17px;
    font-weight:600;
    transition:0.3s;
}

.update-btn:hover{
    transform:translateY(-3px);
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">

        IntelliLMS

    </div>

    <div class="menu">

        <a href="/teacher">
            Dashboard
        </a>

        <a href="/teacher/courses">
            Course Management
        </a>

        <a href="/teacher/assignments">
            Assignment Management
        </a>

        <a href="/teacher/submissions">
            Student Submissions
        </a>

        <a href="/teacher/attendance">
            Attendance
        </a>

        <a href="/quiz_management">
            Quiz Management
        </a>

        <a href="/teacher/analytics">
            Analytics
        </a>

        <a href="/logout">
            Logout
        </a>

    </div>

</div>

<!-- MAIN -->

<div class="main-content">

    <div class="page-title">

        Edit Course ✏️

    </div>

    <div class="subtitle">

        Update course details and learning content.

    </div>

    <div class="form-card">

        <form method="POST">

            <input type="text"
                   name="course_name"
                   class="form-control"
                   value="{{ course['course_name'] }}"
                   required>

            <input type="text"
                   name="instructor"
                   class="form-control"
                   value="{{ course['instructor'] }}"
                   required>

            <textarea name="description"
                      class="form-control"
                      required>{{ course['description'] }}</textarea>

            <input type="text"
                   name="image_url"
                   class="form-control"
                   value="{{ course['image_url'] }}"
                   required>

            <button type="submit"
                    class="update-btn">

                Update Course

            </button>

        </form>

    </div>

</div>

</body>

</html>
