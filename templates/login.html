<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login - IntelliLMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family:'Poppins',sans-serif;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#f8fafc;
        overflow:hidden;
        position:relative;
    }

    body::before{
        content:'';
        position:absolute;
        width:500px;
        height:500px;
        background:#c4b5fd;
        border-radius:50%;
        top:-150px;
        left:-150px;
        filter:blur(120px);
        opacity:0.5;
    }

    body::after{
        content:'';
        position:absolute;
        width:400px;
        height:400px;
        background:#ddd6fe;
        border-radius:50%;
        bottom:-150px;
        right:-100px;
        filter:blur(120px);
        opacity:0.5;
    }

    .login-card{
        width:100%;
        max-width:450px;
        background:rgba(255,255,255,0.75);
        backdrop-filter:blur(18px);
        border-radius:30px;
        padding:45px;
        box-shadow:0 20px 50px rgba(0,0,0,0.08);
        position:relative;
        z-index:10;
    }

    .logo{
        text-align:center;
        font-size:36px;
        font-weight:800;
        color:#4f46e5;
        margin-bottom:10px;
    }

    .subtitle{
        text-align:center;
        color:#6b7280;
        margin-bottom:35px;
    }

    .form-label{
        font-weight:500;
        margin-bottom:10px;
    }

    .form-control{
        height:55px;
        border-radius:15px;
        border:none;
        background:#f1f5f9;
        padding-left:18px;
    }

    .form-control:focus{
        box-shadow:none;
        border:2px solid #4f46e5;
        background:white;
    }

    .login-btn{
        width:100%;
        height:55px;
        border:none;
        border-radius:50px;
        background:linear-gradient(to right,#4f46e5,#7c3aed);
        color:white;
        font-weight:600;
        margin-top:20px;
        transition:0.3s;
    }

    .login-btn:hover{
        transform:translateY(-3px);
    }

    .bottom-text{
        text-align:center;
        margin-top:25px;
        color:#6b7280;
    }

    .bottom-text a{
        color:#4f46e5;
        text-decoration:none;
        font-weight:600;
    }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">
        IntelliLMS
    </div>

    <p class="subtitle">

        Welcome back to your smart learning platform

    </p>

    <form method="POST"
          action="/login">

        <div class="mb-3">

            <label class="form-label">

                Username

            </label>

            <input type="text"
                   name="email"
                   class="form-control"
                   placeholder="Enter username"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Password

            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter password"
                   required>

        </div>

        <button type="submit"
                class="login-btn">

            Login

        </button>

    </form>

    <div class="bottom-text">

        Don’t have an account?

        <a href="/register">

            Register

        </a>

    </div>

</div>

</body>

</html>
